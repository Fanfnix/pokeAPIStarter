<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poke API</title>
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer type="module"></script>
  </head>
  <body>
    <header>
        <section id="filtre">
          <h2>Sélectionner la génération de Pokémon :</h2>
          <div class="select" id="generation">
            <select>
              <option value="1">Génération 1</option>
              <option value="2">Génération 2</option>
              <option value="3">Génération 3</option>
              <option value="4">Génération 4</option>
              <option value="5">Génération 5</option>
              <option value="6">Génération 6</option>
              <option value="7">Génération 7</option>
              <option value="8">Génération 8</option>
            </select>
          </div>
          <h2>Sélectionner un type :</h2>
          <div id="type">
            <div class="checkbox">
              <input type="checkbox" id="steel">
              <label for="steel">Acier</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="dragon">
              <label for="dragon">Dragon</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="electric">
              <label for="electric">Electrik</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="fire">
              <label for="fire">Feu</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="bug">
              <label for="bug">Insecte</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="grass">
              <label for="grass">Plante</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="psychic">
              <label for="psychic">Psy</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="ground">
              <label for="ground">Sol</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="fighting">
              <label for="fighting">Combat</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="water">
              <label for="water">Eau</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="fairy">
              <label for="fairy">Fée</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="ice">
              <label for="ice">Glace</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="normal">
              <label for="normal">Normal</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="poison">
              <label for="poison">Poison</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="rock">
              <label for="rock">Roche</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="ghost">
              <label for="ghost">Spectre</label>
            </div>
            <div class="checkbox">
              <input type="checkbox" id="flying">
              <label for="flying">Vol</label>
            </div>
          </div>
        </section>
    </header>

    <main></main>

  </body>
</html>
